services:
  backend:
    image: mytinyurl-backend:latest
    build:
      context: .
      dockerfile: apps/backend/Dockerfile
      target: runner
    restart: always
    environment:
      - DATABASE_URLS=${DATABASE_URLS}
      - REDIS_URL=redis://redis:6379
      - NODE_ENV=production
      - PORT=3000
      - APP_URL=${APP_URL}
      - CORS_ORIGINS=${CORS_ORIGINS}
      - DEFAULT_EXPIRATION_HOURS=${DEFAULT_EXPIRATION_HOURS:-24}
      - MACHINE_ID=${MACHINE_ID:-1}
      - ENABLE_DOCS=${ENABLE_DOCS:-false}
      - ADMIN_TOKEN=${ADMIN_TOKEN}
      - BLOCK_PRIVATE_TARGETS=${BLOCK_PRIVATE_TARGETS:-true}
      - MAX_URL_LENGTH=${MAX_URL_LENGTH:-2048}
      - MAX_REQUEST_BODY_BYTES=${MAX_REQUEST_BODY_BYTES:-4096}
      - RATE_LIMIT_WINDOW_SECONDS=${RATE_LIMIT_WINDOW_SECONDS:-60}
      - RATE_LIMIT_MAX_SHORTEN=${RATE_LIMIT_MAX_SHORTEN:-20}
      - RATE_LIMIT_MAX_STATS=${RATE_LIMIT_MAX_STATS:-30}
      - RATE_LIMIT_MAX_REDIRECT=${RATE_LIMIT_MAX_REDIRECT:-300}
      - RATE_LIMIT_MAX_HEALTH=${RATE_LIMIT_MAX_HEALTH:-60}
    healthcheck:
      test: ["CMD", "bun", "-e", "fetch('http://127.0.0.1:3000/health').then((response) => { if (!response.ok) process.exit(1); }).catch(() => process.exit(1));"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - mytinyurl-network

  worker:
    image: mytinyurl-worker:latest
    build:
      context: .
      dockerfile: apps/backend/Dockerfile
      target: runner
    command: ["bun", "run", "src/worker.ts"]
    restart: always
    environment:
      - DATABASE_URLS=${DATABASE_URLS}
      - REDIS_URL=redis://redis:6379
      - NODE_ENV=production
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - mytinyurl-network

  redis:
    image: redis:7.4-alpine
    restart: always
    command: ["redis-server", "--appendonly", "yes", "--save", "60", "1000"]
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5
    networks:
      - mytinyurl-network

  # Caddy acts as a reverse proxy and automatically provisions HTTPS via Let's Encrypt
  caddy:
    image: caddy:2-alpine
    restart: always
    ports:
      - "80:80"
      - "443:443"
    environment:
      - APP_DOMAIN=${APP_DOMAIN}
      - LETSENCRYPT_EMAIL=${LETSENCRYPT_EMAIL}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - backend
    networks:
      - mytinyurl-network

volumes:
  caddy_data:
  caddy_config:
  redis_data:

networks:
  mytinyurl-network:
    driver: bridge
