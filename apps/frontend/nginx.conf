server {
    listen 80;
    server_name localhost;
    root /usr/share/nginx/html;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    # Optional: Proxy API requests to backend if needed directly from frontend container,
    # though usually handled by ingress or browser direct to API.
    # location /api {
    #     proxy_pass http://backend:3001;
    # }
}
