services:
  caddy:
    image: caddy:2.10.2-alpine
    ports:
      - target: 80
        published: 80
        protocol: tcp
        mode: host
      - target: 443
        published: 443
        protocol: tcp
        mode: host
    environment:
      APP_DOMAIN: ${APP_DOMAIN}
      LETSENCRYPT_EMAIL: ${LETSENCRYPT_EMAIL}
    configs:
      - source: caddyfile
        target: /etc/caddy/Caddyfile
    volumes:
      - caddy_data:/data
      - caddy_config:/config
    networks:
      - edge
      - app
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.role == manager
      restart_policy:
        condition: any
      update_config:
        order: start-first
        failure_action: rollback
      rollback_config:
        order: stop-first

  backend:
    image: ${BACKEND_IMAGE}
    environment:
      DATABASE_URLS: ${DATABASE_URLS}
      REDIS_URL: redis://redis:6379
      NODE_ENV: production
      PORT: 3000
      APP_URL: ${APP_URL}
      CORS_ORIGINS: ${CORS_ORIGINS}
      DEFAULT_EXPIRATION_HOURS: ${DEFAULT_EXPIRATION_HOURS}
      MACHINE_ID: ${MACHINE_ID}
      ENABLE_DOCS: ${ENABLE_DOCS}
      ADMIN_TOKEN: ${ADMIN_TOKEN}
      BLOCK_PRIVATE_TARGETS: ${BLOCK_PRIVATE_TARGETS}
      MAX_URL_LENGTH: ${MAX_URL_LENGTH}
      MAX_REQUEST_BODY_BYTES: ${MAX_REQUEST_BODY_BYTES}
      RATE_LIMIT_WINDOW_SECONDS: ${RATE_LIMIT_WINDOW_SECONDS}
      RATE_LIMIT_MAX_SHORTEN: ${RATE_LIMIT_MAX_SHORTEN}
      RATE_LIMIT_MAX_STATS: ${RATE_LIMIT_MAX_STATS}
      RATE_LIMIT_MAX_REDIRECT: ${RATE_LIMIT_MAX_REDIRECT}
      RATE_LIMIT_MAX_HEALTH: ${RATE_LIMIT_MAX_HEALTH}
    networks:
      - app
    deploy:
      replicas: ${BACKEND_REPLICAS}
      restart_policy:
        condition: any
      update_config:
        order: start-first
        failure_action: rollback
      rollback_config:
        order: stop-first
    healthcheck:
      test: ["CMD", "bun", "-e", "fetch('http://127.0.0.1:3000/health').then((response) => { if (!response.ok) process.exit(1); }).catch(() => process.exit(1));"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

  worker:
    image: ${BACKEND_IMAGE}
    command: ["bun", "run", "src/worker.ts"]
    environment:
      DATABASE_URLS: ${DATABASE_URLS}
      REDIS_URL: redis://redis:6379
      NODE_ENV: production
    networks:
      - app
    deploy:
      replicas: ${WORKER_REPLICAS}
      restart_policy:
        condition: any
      update_config:
        order: stop-first
        failure_action: rollback
      rollback_config:
        order: stop-first

  redis:
    image: redis:7.4-alpine
    command: ["redis-server", "--appendonly", "yes", "--save", "60", "1000"]
    volumes:
      - redis_data:/data
    networks:
      - app
    deploy:
      replicas: 1
      placement:
        constraints:
          - node.role == manager
      restart_policy:
        condition: any
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

configs:
  caddyfile:
    file: ./Caddyfile

volumes:
  caddy_data:
  caddy_config:
  redis_data:

networks:
  edge:
    driver: overlay
  app:
    driver: overlay
    attachable: true
