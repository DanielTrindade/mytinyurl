services:
  backend:
    build:
      context: ./apps/backend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - DATABASE_URL=postgresql://user:password@postgres:5432/mytinyurl
      - REDIS_URL=redis://redis:6379
      - PORT=3000
      - APP_URL=http://localhost:3000
      - CORS_ORIGINS=http://localhost:5173
      - DEFAULT_EXPIRATION_HOURS=24
    volumes:
      - ./apps/backend/src:/app/src
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - mytinyurl-network

  postgres:
    image: postgres:16-alpine
    restart: always
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: mytinyurl
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d mytinyurl"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - mytinyurl-network

  redis:
    image: redis:7-alpine
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - mytinyurl-network

volumes:
  postgres_data:
  redis_data:

networks:
  mytinyurl-network:
    driver: bridge
