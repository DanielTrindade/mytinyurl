services:
  backend:
    build:
      context: .
      dockerfile: apps/backend/Dockerfile
      target: dev
    ports:
      - "3000:3000"
    environment:
      - DATABASE_URL=postgresql://user:password@postgres:5432/mytinyurl
      - PORT=3000
    volumes:
      - ./apps/backend/src:/app/apps/backend/src
      - ./apps/backend/prisma:/app/apps/backend/prisma
      - ./apps/backend/tsconfig.json:/app/apps/backend/tsconfig.json
      - ./.env:/app/apps/backend/.env
      - ./turbo.json:/app/turbo.json
      # Preserve node_modules
      - /app/node_modules
      - /app/apps/backend/node_modules
    depends_on:
      - postgres
    networks:
      - mytinyurl-network

  frontend:
    build:
      context: .
      dockerfile: apps/frontend/Dockerfile
      target: dev
    ports:
      - "5173:5173"
    environment:
      - VITE_API_URL=http://localhost:3000/api
    volumes:
      - ./apps/frontend/src:/app/apps/frontend/src
      - ./apps/frontend/public:/app/apps/frontend/public
      - ./apps/frontend/index.html:/app/apps/frontend/index.html
      - ./apps/frontend/vite.config.ts:/app/apps/frontend/vite.config.ts
      - ./apps/frontend/tailwind.config.js:/app/apps/frontend/tailwind.config.js
      - ./apps/frontend/postcss.config.js:/app/apps/frontend/postcss.config.js
      - ./apps/frontend/tsconfig.json:/app/apps/frontend/tsconfig.json
      - ./apps/frontend/tsconfig.app.json:/app/apps/frontend/tsconfig.app.json
      - ./apps/frontend/tsconfig.node.json:/app/apps/frontend/tsconfig.node.json
      - ./turbo.json:/app/turbo.json
      # Preserve node_modules
      - /app/node_modules
      - /app/apps/frontend/node_modules
    networks:
      - mytinyurl-network

  postgres:
    image: postgres:16-alpine
    restart: always
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: mytinyurl
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - mytinyurl-network

volumes:
  postgres_data:


networks:
  mytinyurl-network:
    driver: bridge