services:
  backend:
    build:
      context: .
      dockerfile: apps/backend/Dockerfile
      target: runner
    ports:
      - "3000:3000"
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - PORT=3000
      - APP_URL=${APP_URL}
      - CORS_ORIGINS=${CORS_ORIGINS}
    depends_on:
      - postgres
    networks:
      - mytinyurl-network

  frontend:
    build:
      context: .
      dockerfile: apps/frontend/Dockerfile
      target: runner
    ports:
      - "80:80"
    networks:
      - mytinyurl-network

  postgres:
    image: postgres:16-alpine
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-password}
      POSTGRES_DB: ${POSTGRES_DB:-mytinyurl}
    volumes:
      - postgres_data_prod:/var/lib/postgresql/data
    networks:
      - mytinyurl-network
    # Only start postgres if explicitly enabled or needed.
    # But usually in docker-compose, we include it.
    # If using external DB, user can remove this service or just not use it.

volumes:
  postgres_data_prod:

networks:
  mytinyurl-network:
    driver: bridge